<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Live Supabase Dashboard</title>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  padding: 20px;
  background: #f4f4f4;
}

.controls {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}

input {
  padding: 6px;
}

button {
  padding: 6px 10px;
  cursor: pointer;
}

.cards {
  display: flex;
  gap: 15px;
  margin: 20px 0;
}

.card {
  background: white;
  padding: 15px;
  flex: 1;
  border-radius: 8px;
}

canvas {
  background: white;
  margin-top: 20px;
  padding: 10px;
}

table {
  width: 100%;
  background: white;
  margin-top: 20px;
  border-collapse: collapse;
}

th, td {
  border: 1px solid #ddd;
  padding: 8px;
}

th {
  background: #333;
  color: white;
}

.pagination {
  margin-top: 10px;
}
</style>
</head>

<body>

<h2>📊 Live Supabase Dashboard</h2>

<div class="controls">
  <button onclick="loadData()">🔄 Load Data</button>
  <input type="text" id="search" placeholder="Search..." onkeyup="applyFilter()" />
  <button onclick="exportCSV()">📥 Export CSV</button>
</div>

<div id="status"></div>

<div class="cards">
  <div class="card">
    <h3>Total Rows</h3>
    <p id="total">0</p>
  </div>

  <div class="card">
    <h3>Unique (First Column)</h3>
    <p id="unique">0</p>
  </div>
</div>

<canvas id="barChart"></canvas>
<canvas id="pieChart"></canvas>

<table>
  <thead id="thead"></thead>
  <tbody id="tbody"></tbody>
</table>

<div class="pagination">
  <button onclick="prevPage()">⬅ Prev</button>
  <span id="pageInfo"></span>
  <button onclick="nextPage()">Next ➡</button>
</div>

<!-- ✅ Supabase ESM (FIXED) -->
<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

/* ================= CONFIG ================= */
const SUPABASE_URL = "https://oxilhnuwjvwcgftplxyl.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im94aWxobnV3anZ3Y2dmdHBseHlsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwNTI3NzMsImV4cCI6MjA5MTYyODc3M30.DsVVqSASKXzQEWZMQ-hmRre1kIWDFiJMTMNzz5jNF48"; // keep yours
const TABLE_NAME = "contacts";

/* ================= INIT ================= */
const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

let fullData = [];
let filteredData = [];
let page = 1;
const pageSize = 10;

let barChart, pieChart;

/* ================= LOAD DATA ================= */
window.loadData = async function () {
  const status = document.getElementById("status");
  status.innerText = "Loading...";

  try {
    const { data, error } = await supabase
      .from(TABLE_NAME)
      .select("*");

    console.log("DATA:", data);
    console.log("ERROR:", error);

    if (error) {
      status.innerText = "Error: " + error.message;
      return;
    }

    if (!data || data.length === 0) {
      status.innerText = "No data found (check RLS)";
      return;
    }

    status.innerText = "Loaded " + data.length + " rows";

    fullData = data;
    filteredData = data;

    renderInsights();
    renderCharts();
    renderTable();

  } catch (err) {
    console.error(err);
    status.innerText = err.message;
  }
};

/* ================= FILTER ================= */
window.applyFilter = function () {
  const term = document.getElementById("search").value.toLowerCase();

  filteredData = fullData.filter(row =>
    Object.values(row).some(val =>
      String(val).toLowerCase().includes(term)
    )
  );

  page = 1;
  renderTable();
};

/* ================= INSIGHT ================= */
function renderInsights() {
  document.getElementById("total").innerText = fullData.length;

  const key = Object.keys(fullData[0])[0];
  const unique = new Set(fullData.map(d => d[key]));

  document.getElementById("unique").innerText = unique.size;
}

/* ================= CHART ================= */
function renderCharts() {
  const key = Object.keys(fullData[0])[0];

  const counts = {};
  fullData.forEach(row => {
    const val = row[key] || "Unknown";
    counts[val] = (counts[val] || 0) + 1;
  });

  const labels = Object.keys(counts).slice(0, 10);
  const values = Object.values(counts).slice(0, 10);

  if (barChart) barChart.destroy();
  if (pieChart) pieChart.destroy();

  barChart = new Chart(document.getElementById("barChart"), {
    type: "bar",
    data: {
      labels,
      datasets: [{ label: key, data: values }]
    }
  });

  pieChart = new Chart(document.getElementById("pieChart"), {
    type: "pie",
    data: {
      labels,
      datasets: [{ data: values }]
    }
  });
}

/* ================= TABLE ================= */
function renderTable() {
  const start = (page - 1) * pageSize;
  const data = filteredData.slice(start, start + pageSize);

  const keys = Object.keys(fullData[0]);

  document.getElementById("thead").innerHTML =
    "<tr>" + keys.map(k => `<th>${k}</th>`).join("") + "</tr>";

  document.getElementById("tbody").innerHTML =
    data.map(row =>
      "<tr>" +
      keys.map(k => `<td>${row[k] ?? ""}</td>`).join("") +
      "</tr>"
    ).join("");

  document.getElementById("pageInfo").innerText =
    `Page ${page} / ${Math.ceil(filteredData.length / pageSize)}`;
}

/* ================= PAGINATION ================= */
window.nextPage = function () {
  if (page * pageSize < filteredData.length) {
    page++;
    renderTable();
  }
};

window.prevPage = function () {
  if (page > 1) {
    page--;
    renderTable();
  }
};

/* ================= CSV ================= */
window.exportCSV = function () {
  const keys = Object.keys(fullData[0]);

  const rows = fullData.map(row =>
    keys.map(k => `"${row[k]}"`).join(",")
  );

  const csv = [keys.join(","), ...rows].join("\n");

  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "data.csv";
  a.click();
};
</script>

</body>
</html>
