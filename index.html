<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Supabase Smart Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  padding: 20px;
  background: #f4f4f4;
}

h2 {
  margin-bottom: 10px;
}

button {
  padding: 8px 12px;
  cursor: pointer;
}

#status {
  margin-top: 10px;
  font-weight: bold;
}

.cards {
  display: flex;
  gap: 15px;
  margin-top: 20px;
}

.card {
  background: white;
  padding: 15px;
  flex: 1;
  border-radius: 8px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.card h3 {
  margin: 0;
}

canvas {
  background: white;
  margin-top: 20px;
  padding: 10px;
}

table {
  width: 100%;
  margin-top: 20px;
  background: white;
  border-collapse: collapse;
}

th, td {
  border: 1px solid #ddd;
  padding: 8px;
}

th {
  background: #333;
  color: white;
}

.error {
  color: red;
}
</style>
</head>

<body>

<h2>📊 Smart Data Dashboard</h2>

<button onclick="loadData()">🔄 Load Data</button>

<div id="status"></div>

<!-- SUMMARY -->
<div class="cards">
  <div class="card">
    <h3>Total Records</h3>
    <p id="total">0</p>
  </div>

  <div class="card">
    <h3>Columns</h3>
    <p id="columns">0</p>
  </div>
</div>

<!-- CHART -->
<canvas id="chart"></canvas>

<!-- TABLE -->
<table>
  <thead id="thead"></thead>
  <tbody id="tbody"></tbody>
</table>

<script>
let chart;

async function loadData() {
  const status = document.getElementById("status");

  status.innerText = "Loading...";

  try {
    const res = await fetch("https://supa-indol.vercel.app/api/data");
    const data = await res.json();

    if (!Array.isArray(data) || data.length === 0) {
      status.innerText = "No data found";
      return;
    }

    status.innerText = "Loaded " + data.length + " rows";

    renderSummary(data);
    renderChart(data);
    renderTable(data);

  } catch (err) {
    status.innerHTML = "<span class='error'>" + err.message + "</span>";
  }
}

// 📊 SUMMARY
function renderSummary(data) {
  document.getElementById("total").innerText = data.length;
  document.getElementById("columns").innerText = Object.keys(data[0]).length;
}

// 📈 CHART (auto detect first column frequency)
function renderChart(data) {
  const key = Object.keys(data[0])[0]; // first column

  const counts = {};

  data.forEach(row => {
    const val = row[key] || "Unknown";
    counts[val] = (counts[val] || 0) + 1;
  });

  const labels = Object.keys(counts);
  const values = Object.values(counts);

  if (chart) chart.destroy();

  const ctx = document.getElementById("chart");

  chart = new Chart(ctx, {
    type: "bar",
    data: {
      labels: labels,
      datasets: [{
        label: key + " distribution",
        data: values
      }]
    }
  });
}

// 📋 TABLE
function renderTable(data) {
  const thead = document.getElementById("thead");
  const tbody = document.getElementById("tbody");

  const keys = Object.keys(data[0]);

  thead.innerHTML = "<tr>" + keys.map(k => `<th>${k}</th>`).join("") + "</tr>";

  tbody.innerHTML = data.map(row =>
    "<tr>" +
    keys.map(k => `<td>${row[k] ?? ""}</td>`).join("") +
    "</tr>"
  ).join("");
}
</script>

</body>
</html>
